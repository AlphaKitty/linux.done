<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>linux.done</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-left">
        <svg class="header-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        <h1>linux.done</h1>
      </div>
      <div class="header-right">
        <span id="scanStatusDot" class="status-dot"></span>
        <span class="status-text" id="lastScanTime">---</span>
      </div>
    </header>

    <div class="toolbar">
      <button class="btn btn-secondary" id="testNotifBtn" data-i18n="popup.notify" title="Test notification">Notify</button>
      <button class="btn btn-icon" id="toggleNotif">
        <svg id="notifIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </button>
      <button class="btn btn-icon" id="toggleAutoRemove" title="Auto-remove after open" data-i18n-title="popup.auto_remove_on">
        <svg id="autoRemoveIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
      </button>
      <button class="btn btn-icon" id="openSettingsBtn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <span class="toolbar-spacer"></span>
      <button class="btn btn-clear" id="clearBtn" title="Clear all">✕</button>
    </div>

    <div class="rules-summary">
      <span id="ruleCount">---</span>
    </div>

    <div id="notifTip" class="tip-banner" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span id="notifTipText"></span>
    </div>

    <div class="columns">
      <section class="section">
        <h2 class="section-title" data-i18n="popup.new_topics">New Topics</h2>
        <div id="newTopicsList" class="matched-list">
          <div class="empty-state"><span data-i18n="popup.no_matches">No matches yet</span></div>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title" data-i18n="popup.new_activity">Latest Activity</h2>
        <div id="activityList" class="matched-list">
          <div class="empty-state"><span data-i18n="popup.no_matches">No matches yet</span></div>
        </div>
      </section>
    </div>

    <footer class="footer">
      <span>v1.0</span>
      <span>linux.done</span>
    </footer>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
